version: "3.8"

services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: chotaomatkhau1
      POSTGRES_DB: ebook2latex_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:chotaomatkhau1@db:5432/ebook2latex_db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
